<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Details — 4Kautos</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="listings.html">Listings</a></li>
  </ul>
  <div class="nav-actions">
    <button class="nav-btn nav-btn-ghost" id="nav-login-btn">Sign In</button>
    <button class="nav-btn nav-btn-accent" id="nav-signup-btn">List Your Car</button>
    <button class="nav-btn nav-btn-ghost hidden" id="nav-profile-btn" onclick="location.href='profile.html'">👤 <span class="nav-user-label">Profile</span></button>
  </div>
</nav>

<div id="detail-spinner" class="spinner-wrap" style="min-height:60vh"><div class="spinner"></div></div>
<div id="detail-content" class="hidden">

  <div class="detail-layout">
    <!-- Left: Gallery + Specs -->
    <div class="detail-main">
      <div class="detail-breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="listings.html">Listings</a>
        <span>›</span>
        <span id="bc-title">Loading…</span>
      </div>

      <!-- Gallery -->
      <div class="gallery" style="margin-bottom:1.5rem">
        <div class="gallery-main">
          <img id="gallery-main-img" src="" alt="Car photo">
          <button class="gallery-nav-btn prev" id="gal-prev">‹</button>
          <button class="gallery-nav-btn next" id="gal-next">›</button>
        </div>
        <div class="gallery-thumbs" id="gallery-thumbs"></div>
      </div>

      <!-- Description -->
      <div class="detail-desc">
        <h4>Description</h4>
        <p id="car-desc">—</p>
      </div>

      <!-- Specs -->
      <div class="specs-table">
        <div class="specs-table-title">Vehicle Specifications</div>
        <dl id="specs-dl"></dl>
      </div>

    </div>

    <!-- Right: CTA Sidebar -->
    <aside class="detail-sidebar">
      <div class="cta-card">
        <div class="detail-header">
          <div class="detail-badges">
            <span class="detail-badge badge-condition" id="d-condition"></span>
            <span class="detail-badge badge-year" id="d-year"></span>
          </div>
          <h1 class="detail-title" id="d-title">Loading…</h1>
        </div>
        <div class="cta-price-row">
          <div class="cta-label">Asking Price</div>
          <div class="cta-price" id="d-price">—</div>
        </div>

        <button class="cta-btn cta-btn-primary" id="buy-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Initiate Purchase
        </button>
        <button class="cta-btn cta-btn-secondary" id="chat-enquire-btn">
          💬 Ask AutoBot about this car
        </button>

        <div class="seller-info">
          <h5>Seller</h5>
          <div class="seller-row">
            <div class="seller-avatar" id="seller-ava">?</div>
            <div>
              <div class="seller-name" id="seller-name">—</div>
              <div class="seller-badge" id="seller-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Verified Seller
              </div>
            </div>
          </div>
        </div>

        <div class="safety-note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Payments are held in secure escrow until you confirm receipt of the vehicle.
        </div>
      </div>
    </aside>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  let photos = [], currentPhoto = 0, car = null;

  function setPhoto(i) {
    if (!photos.length) return;
    currentPhoto = (i + photos.length) % photos.length;
    document.getElementById('gallery-main-img').src = photos[currentPhoto];
    document.querySelectorAll('.gallery-thumb').forEach((t,j) => t.classList.toggle('active', j === currentPhoto));
  }

  document.getElementById('gal-prev').addEventListener('click', () => setPhoto(currentPhoto - 1));
  document.getElementById('gal-next').addEventListener('click', () => setPhoto(currentPhoto + 1));

  async function load() {
    if (!id) { location.href = 'listings.html'; return; }
    try {
      car = await API.getCar(id);
      document.title = `${car.title || car.make + ' ' + car.model} — 4Kautos`;
      document.getElementById('bc-title').textContent = car.title || `${car.year} ${car.make} ${car.model}`;
      document.getElementById('d-title').textContent  = car.title || `${car.year} ${car.make} ${car.model}`;
      document.getElementById('d-price').textContent  = car.price ? `₦${Number(car.price).toLocaleString()}` : 'Price on Request';
      document.getElementById('d-condition').textContent = car.condition || 'N/A';
      document.getElementById('d-year').textContent   = car.year || '';
      document.getElementById('car-desc').textContent = car.description || 'No description provided.';

      // Seller
      const seller = car.seller;
      const initials = seller?.name ? seller.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : '?';
      document.getElementById('seller-ava').textContent  = initials;
      document.getElementById('seller-name').textContent = seller?.name || 'Unknown Seller';
      if (!seller?.verified) document.getElementById('seller-badge').innerHTML = '<span style="color:var(--text3)">Unverified</span>';

      // Gallery
      photos = car.photos?.length ? car.photos : [`https://placehold.co/800x500/18181d/f59e0b?text=${encodeURIComponent(car.make||'Car')}`];
      document.getElementById('gallery-main-img').src = photos[0];
      const thumbsEl = document.getElementById('gallery-thumbs');
      if (photos.length > 1) {
        thumbsEl.innerHTML = photos.map((p,i) =>
          `<div class="gallery-thumb ${i===0?'active':''}" data-i="${i}"><img src="${p}" alt="Photo ${i+1}" loading="lazy"></div>`
        ).join('');
        thumbsEl.querySelectorAll('.gallery-thumb').forEach(t =>
          t.addEventListener('click', () => setPhoto(+t.dataset.i))
        );
      }

      // Specs table
      const specs = [
        ['Make',       car.make],
        ['Model',      car.model],
        ['Year',       car.year],
        ['Mileage',    car.mileage ? `${Number(car.mileage).toLocaleString()} km` : null],
        ['Condition',  car.condition],
        ['VIN',        car.vin],
        ['Price',      car.price ? `₦${Number(car.price).toLocaleString()}` : null],
        ['Listed',     car.createdAt ? new Date(car.createdAt).toLocaleDateString() : null],
      ].filter(([,v]) => v);

      document.getElementById('specs-dl').innerHTML = specs.map(([k,v]) =>
        `<div class="spec-row"><dt>${k}</dt><dd>${v}</dd></div>`
      ).join('');

      document.getElementById('detail-spinner').classList.add('hidden');
      document.getElementById('detail-content').classList.remove('hidden');
    } catch(e) {
      document.getElementById('detail-spinner').innerHTML = `<div class="empty-state"><h3>Car Not Found</h3><p><a href="listings.html" style="color:var(--accent)">Browse all listings</a></p></div>`;
    }
  }

  // Buy button
  document.getElementById('buy-btn').addEventListener('click', async () => {
    if (!API.isLoggedIn()) { openAuth('login'); return; }
    const user = API.getUser();
    if (user.role !== 'buyer') { toast('Only buyers can initiate purchases', 'error'); return; }
    try {
      await API.initTx(car.id, car.seller?.id);
      toast('Purchase initiated! Check your profile for status.', 'success');
    } catch(e) {
      toast(e.message, 'error');
    }
  });

  // Enquire via chatbot
  document.getElementById('chat-enquire-btn').addEventListener('click', () => {
    // Open chatbot and pre-fill message
    document.getElementById('chat-fab').click();
    setTimeout(() => {
      const title = car ? (car.title || `${car.year} ${car.make} ${car.model}`) : 'this car';
      document.getElementById('chat-input').value = `Tell me more about the ${title} listed at ${document.getElementById('d-price').textContent}`;
    }, 300);
  });

  load();
</script>
</body>
</html>
