<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — 4Kautos</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script>try{var t=localStorage.getItem('4k_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"></a>
  <div class="nav-actions">
    <button class="nav-btn nav-btn-ghost" id="nav-login-btn">Sign In</button>
    <button class="nav-btn nav-btn-accent" id="nav-signup-btn">List Your Car</button>
    <button class="nav-btn nav-btn-ghost hidden" id="nav-profile-btn" onclick="location.href='profile.html'">👤 <span class="nav-user-label">Profile</span></button>
  </div>
</nav>

<div style="max-width:560px;margin:0 auto;padding:5rem 1.5rem;text-align:center">
  <div id="pay-icon" style="font-size:3rem">⏳</div>
  <h1 id="pay-title" style="font-family:var(--font-display);margin:1rem 0 .5rem">Checking your payment…</h1>
  <p id="pay-msg" style="color:var(--text2);line-height:1.6">One moment.</p>
  <a href="profile.html" class="cta-btn cta-btn-primary" style="display:inline-flex;margin-top:1.75rem;text-decoration:none">Go to my dashboard →</a>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  // Flutterwave redirects here with ?status=&tx_ref=&transaction_id=. This page is
  // just feedback — the authoritative escrow update happens server-side via webhook.
  const p = new URLSearchParams(location.search);
  const status = (p.get('status') || '').toLowerCase();
  const icon = document.getElementById('pay-icon');
  const title = document.getElementById('pay-title');
  const msg = document.getElementById('pay-msg');

  if (status === 'successful' || status === 'completed') {
    icon.textContent = '✅';
    title.textContent = 'Payment received';
    msg.textContent = 'Your funds are now held safely in escrow — released to the seller only once you confirm the vehicle. Taking you to your dashboard…';
  } else if (status === 'cancelled') {
    icon.textContent = '↩️';
    title.textContent = 'Payment cancelled';
    msg.textContent = 'No charge was made. Returning you to your dashboard — you can start the payment again anytime.';
  } else {
    icon.textContent = '⏳';
    title.textContent = 'Checking your payment…';
    msg.textContent = 'Your dashboard will show the latest status — we confirm every payment securely on our server. Taking you there now…';
  }
  // Always return to the app — the dashboard reflects the real (webhook-confirmed) status.
  setTimeout(() => { location.href = 'profile.html'; }, 3000);
</script>
</body>
</html>
