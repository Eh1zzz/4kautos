<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Listings — 4Kautos</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#f5f6fc">
  <script>try{var t=localStorage.getItem('4k_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="listings.html" class="active">Listings</a></li>
    <li><a href="clearance.html">Clearance</a></li>
    <li><a href="index.html#how-it-works">How It Works</a></li>
  </ul>
  <div class="nav-search">
    <div class="nav-search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="nav-q" placeholder="Search make, model…">
    </div>
  </div>
  <div class="nav-actions">
    <button class="nav-btn nav-btn-ghost" id="nav-login-btn">Sign In</button>
    <button class="nav-btn nav-btn-accent" id="nav-signup-btn">List Your Car</button>
    <button class="nav-btn nav-btn-ghost hidden" id="nav-profile-btn" data-act="goto" data-href="profile.html">👤 <span class="nav-user-label">Profile</span></button>
  </div>
</nav>

<div class="listings-layout">
  <!-- Sidebar -->
  <aside class="filter-sidebar">
    <h3 data-i18n="listings.filterTitle">🔍 Filter Cars</h3>

    <div class="filter-group">
      <label class="filter-label" data-i18n="listings.make">Make</label>
      <select class="sf-select" id="f-make">
        <option value="">Any Make</option>
        <option>Toyota</option><option>Honda</option><option>Ford</option>
        <option>BMW</option><option>Mercedes-Benz</option><option>Hyundai</option>
        <option>Kia</option><option>Lexus</option><option>Nissan</option><option>Volkswagen</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-i18n="listings.model">Model</label>
      <input class="sf-input" type="text" id="f-model" placeholder="e.g. Camry">
    </div>

    <div class="filter-group">
      <label class="filter-label" data-i18n="listings.year">Year</label>
      <div class="price-row">
        <input class="sf-input" type="number" id="f-year-min" placeholder="From" min="1990" max="2025">
        <input class="sf-input" type="number" id="f-year-max" placeholder="To"   min="1990" max="2025">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-i18n="listings.price">Price (₦)</label>
      <div class="price-row">
        <input class="sf-input" type="number" id="f-price-min" placeholder="Min">
        <input class="sf-input" type="number" id="f-price-max" placeholder="Max">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-i18n="listings.condition">Condition</label>
      <label class="filter-check"><input type="checkbox" value="excellent"> <span data-i18n="cond.excellent">Excellent</span></label>
      <label class="filter-check"><input type="checkbox" value="good"> <span data-i18n="cond.good">Good</span></label>
      <label class="filter-check"><input type="checkbox" value="fair"> <span data-i18n="cond.fair">Fair</span></label>
    </div>

    <button class="filter-apply" id="f-apply" data-i18n="listings.apply">Apply Filters</button>
    <button class="filter-reset" id="f-reset" data-i18n="listings.clear">Clear All</button>
  </aside>

  <!-- Main -->
  <main class="listings-main">
    <div class="brand-strip brand-strip-sm" id="brand-strip"></div>
    <div class="listings-topbar">
      <div class="listings-count"><span data-i18n="listings.showing">Showing</span> <strong id="results-count">0</strong> <span data-i18n="listings.vehicles">vehicles</span></div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" id="view-grid" data-i18n="listings.grid">▦ Grid</button>
          <button class="view-btn" data-view="map" id="view-map" data-i18n="listings.map">🗺 Map</button>
        </div>
        <div class="sort-row">
          <span class="sort-label" data-i18n="listings.sortLabel">Sort:</span>
          <select class="sort-select" id="sort-select">
            <option value="-createdAt" data-i18n="listings.sortNew">Newest First</option>
            <option value="price" data-i18n="listings.sortPriceLow">Price: Low → High</option>
            <option value="-price" data-i18n="listings.sortPriceHigh">Price: High → Low</option>
            <option value="mileage" data-i18n="listings.sortMileage">Lowest Mileage</option>
          </select>
        </div>
      </div>
    </div>

    <div id="listings-spinner" class="spinner-wrap"><div class="spinner"></div></div>
    <div class="cars-grid hidden" id="listings-grid"></div>
    <div id="listings-map" class="listings-map hidden"></div>
    <div class="empty-state hidden" id="listings-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M5 17H3v-4l2-5h14l2 5v4h-2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>
      <h3 data-i18n="listings.emptyTitle">No Cars Found</h3>
      <p><span data-i18n="listings.emptyHint">Try adjusting your filters</span> or <a href="listings.html" style="color:var(--accent)">clear all filters</a></p>
    </div>
    <div class="pagination hidden" id="pagination"></div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/pages/listings.js"></script>
</body>
</html>
